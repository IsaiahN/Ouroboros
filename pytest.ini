[pytest]
# Configure pytest to only look in the tests/ directory
testpaths = tests
# Ignore the root __init__.py which has relative imports
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Use importlib mode to avoid __init__.py import issues
addopts = --import-mode=importlib
filterwarnings =
	error
	ignore::DeprecationWarning
	ignore::PendingDeprecationWarning

# Fail if any __pycache__ directories exist after tests run.
# This is enforced in conftest.py via a sessionfinish hook.
